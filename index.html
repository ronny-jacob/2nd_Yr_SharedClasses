    <h1>Shared Elective Class Finder</h1>
    <p class="sub">146 students &middot; Trimesters IV, V &amp; VI</p>

  <div class="card">

    </div>
    <div class="sl" id="stList"></div>
    <div class="sb">

      <div class="sb2" id="selBdg"></div>
      <span class="ca" onclick="clrAll()" id="caBtn" style="display:none">Clear all</span>
    </div>
  </div>
  <div class="card" id="RC">
    <div class="tw"><div class="tabs" id="mainTabs">
      <button class="tab active" onclick="showTab('iv',this)">Trim IV</button>

    <div id="panel-iv" class="panel active"></div>

    <div class="exp-hdr" onclick="toggleExp('schBody','schArr')">

    <div class="exp-body" id="schBody">
      <div style="margin-bottom:8px;margin-top:0">

      </div>
      <div id="schList"></div>
      <div id="schResult"></div>
    </div>
  </div>
  <div class="card" id="RC2">
    <div class="exp-hdr" onclick="toggleExp('subjBody','subjArr')">
      <span class="exp-title">All Subjects</span>
      <span class="exp-arr" id="subjArr">&#9660;</span>
    </div>
    <div class="exp-body" id="subjBody">
      <div class="sc2" style="margin-top:0">

        <button class="srt" id="srtNm" onclick="sSrt('name',this)">A-Z</button>
      </div>
      <div id="subjResults"></div>
    </div>
  </div>

  lb.textContent=so.length+' selected';ca.style.display=so.length?'inline':'none';
  var o=[];for(var i=0;i<so.length;i++){var nm=so[i],c=gc(nm),ix=ni[nm];
    o.push('<span class="bdg" style="background:'+c[0]+';color:'+c[1]+'">'+he(nm)+'<span class="rm" onclick="ti('+ix+')">&#215;</span></span>');}
  be.innerHTML=o.join('');}
function rT(tk){
  var p=document.getElementById('panel-'+tk),n=so.length;
  if(n<2){p.innerHTML='<div class="empty">Select at least 2 students to see shared classes.</div>';return;}
  var a=CLASSES[tk],rows=[];
  for(var i=0;i<a.length;i++){var m=[];
    for(var j=0;j<a[i].students.length;j++){if(hs(a[i].students[j]))m.push(a[i].students[j]);}
    if(m.length>=2)rows.push({cls:a[i].cls,matched:m});}
  rows.sort(function(a,b){return b.matched.length-a.matched.length;});
  if(!rows.length){p.innerHTML='<div class="empty">No shared classes among selected students this trimester.</div>';return;}
  var o=['<table class="mt"><tr><th style="width:34%">Class</th><th>Students together</th><th style="width:50px;text-align:center">Count</th></tr>'];
  for(var r=0;r<rows.length;r++){var row=rows[r],bdg=[];
    for(var mm=0;mm<row.matched.length;mm++){var nm=row.matched[mm],c=gc(nm);
      bdg.push('<span class="tb" style="background:'+c[0]+';color:'+c[1]+'">'+he(dN(nm))+'</span>');}
    o.push('<tr><td><span class="cn">'+he(sN(row.cls))+'</span><span class="fc">'+he(fN(row.cls))+'</span></td>');
    o.push('<td>'+bdg.join('')+'</td><td style="text-align:center"><span class="cp">'+row.matched.length+'</span></td></tr>');}
  o.push('</table>');p.innerHTML=o.join('');}
function rMx(){
  var p=document.getElementById('panel-matrix'),n=so.length;
  var exp='<div class="mx-exp"><strong>How to read this:</strong> Each cell shows how many elective classes two students share across all three trims. Darker blue = more classes in common. Use it to spot which pairs have the most overlap &mdash; useful for knowing who you&#39;ll be sitting with the most.</div>';
  if(n<2){p.innerHTML=exp+'<div class="empty">Select at least 2 students to see the overlap matrix.</div>';return;}
  if(n>15){p.innerHTML=exp+'<div class="empty">Select 15 or fewer students to display the matrix.</div>';return;}
  var cnt=[];for(var i=0;i<n;i++){cnt.push([]);for(var j=0;j<n;j++)cnt[i].push(0);}
  var tr=['iv','v','vi'];
  for(var t=0;t<tr.length;t++){var a=CLASSES[tr[t]];
    for(var ci2=0;ci2<a.length;ci2++){var ic=[];
      for(var si=0;si<n;si++){for(var ss2=0;ss2<a[ci2].students.length;ss2++){
        if(a[ci2].students[ss2]===so[si]){ic.push(si);break;}}}
      for(var aa=0;aa<ic.length;aa++){for(var bb=aa+1;bb<ic.length;bb++){
        cnt[ic[aa]][ic[bb]]++;cnt[ic[bb]][ic[aa]]++;}}}}
  var mx2=1;for(var i=0;i<n;i++)for(var j=0;j<n;j++){if(i!==j&&cnt[i][j]>mx2)mx2=cnt[i][j];}
  var o=['<div class="mw"><table class="mx"><tr><th></th>'];
  for(var j=0;j<n;j++){
    var c=gc(so[j]);
    o.push('<th style="color:'+c[1]+';background:'+c[0]+';border-radius:4px;padding:5px 8px">'+he(dN(so[j]))+'</th>');}
  o.push('</tr>');
  for(var i=0;i<n;i++){
    var rc=gc(so[i]);
    o.push('<tr><th class="rh" style="color:'+rc[1]+';background:'+rc[0]+';border-radius:4px">'+he(dN(so[i]))+'</th>');
    for(var j=0;j<n;j++){
      if(i===j){o.push('<td class="dg">&#8212;</td>');}
      else if(j<i){o.push('<td class="bl"></td>');}
      else{var v=cnt[i][j];
        var al=v===0?0:0.15+(v/mx2)*0.70;
        var bg=v===0?'#f0f0f0':'rgba(30,64,175,'+al.toFixed(2)+')';
        var tc=al>0.45?'#fff':'#222';
        o.push('<td style="background:'+bg+';color:'+tc+';border-radius:4px">'+( v===0?'0':v)+'</td>');}}
    o.push('</tr>');}
  o.push('</table></div>');
  o.push('<div class="mx-note">Upper triangle only &mdash; the table is symmetric. Each number is shared classes across Trim IV + V + VI combined.</div>');
  p.innerHTML=exp+o.join('');}
function rSu(){
  var p=document.getElementById('subjResults'),qq=sq.toLowerCase(),list=[];
  for(var i=0;i<SUBJECTS.length;i++){var s=SUBJECTS[i];
    if(!qq||s.short.toLowerCase().indexOf(qq)!==-1||s.faculty.toLowerCase().indexOf(qq)!==-1)list.push(s);}
  var to={iv:0,v:1,vi:2};
  if(ss==='count')list.sort(function(a,b){return b.count-a.count;});
  else if(ss==='name')list.sort(function(a,b){return a.short<b.short?-1:a.short>b.short?1:0;});
  else list.sort(function(a,b){return to[a.trim]-to[b.trim]||(a.short<b.short?-1:a.short>b.short?1:0);});
  if(!list.length){p.innerHTML='<div class="empty">No subjects found.</div>';return;}
  var o=['<table class="st"><tr><th style="width:40%">Class</th><th style="width:65px">Trim</th><th style="width:85px;text-align:right">Students</th><th style="width:50px;text-align:center">Roster</th></tr>'];
  for(var i=0;i<list.length;i++){var s=list[i];
    var bw=Math.round((s.count/MX)*100);
    var bc=s.trim==='iv'?'#7dd3fc':s.trim==='v'?'#86efac':'#c4b5fd';
    var cc=s.trim==='iv'?'civ':s.trim==='v'?'cv':'cvi';
    o.push('<tr><td><span class="cn" style="font-size:12.5px">'+he(s.short)+'</span><span class="fc">'+he(s.faculty)+'</span></td>');
    o.push('<td><span class="tc '+cc+'">'+s.trimLabel+'</span></td>');
    o.push('<td style="text-align:right"><strong>'+s.count+'</strong><div class="bb"><div class="bf" style="width:'+bw+'%;background:'+bc+'"></div></div></td>');
    o.push('<td style="text-align:center"><span class="rt" onclick="tR(\'rp'+i+'\')">&#9660;</span></td></tr>');
    o.push('<tr class="rr"><td colspan="4"><div id="rp'+i+'" class="rp">');
    for(var jj=0;jj<s.students.length;jj++){var sn=s.students[jj];
      if(hs(sn)){var sc2=gc(sn);o.push('<span class="rn" style="background:'+sc2[0]+';color:'+sc2[1]+'">'+he(sn)+'</span>');}
      else{o.push('<span class="rn ru">'+he(sn)+'</span>');}}
    o.push('</div></td></tr>');}
  o.push('</table>');p.innerHTML=o.join('');}
function tR(id){var e=document.getElementById(id);if(e)e.classList.toggle('open');}
function schFlt(v){
  schQ=v;schSel=null;
  renderSchList();
  document.getElementById('schResult').innerHTML='';}
function renderSchList(){
  var el=document.getElementById('schList'),qq=schQ.toLowerCase();
  if(!qq){el.innerHTML='';return;}
  var matches=[],o=[];
  for(var i=0;i<STUDENTS.length;i++){
    if(STUDENTS[i].toLowerCase().indexOf(qq)!==-1)matches.push(i);}
  if(!matches.length){el.innerHTML='<div class="no-r">No students found.</div>';return;}
  for(var i=0;i<matches.length;i++){
    var idx=matches[i],nm=STUDENTS[idx],isSel=(schSel===nm);
    var bg=isSel?(hs(nm)?'background:'+gc(nm)[0]:'background:#f0f0ee'):'';
    var fw=isSel?'font-weight:600':'';
    o.push('<div class="si2" style="'+bg+';'+fw+'" onclick="schPick('+idx+')">');
    if(hs(nm)){var c=gc(nm);o.push('<div class="sck" style="background:'+c[2]+';border-color:'+c[2]+'">&#10003;</div>');}
    else o.push('<div class="sck"></div>');
    o.push('<span class="snm">'+he(nm)+'</span></div>');}
  el.innerHTML=o.join('');}
function schPick(idx){schSel=STUDENTS[idx];renderSchList();renderSchResult();}
function renderSchResult(){
  var p=document.getElementById('schResult');
  if(!schSel){p.innerHTML='';return;}
  var name=schSel;
  var trims=[{k:'iv',l:'Trimester IV'},{k:'v',l:'Trimester V'},{k:'vi',l:'Trimester VI'}];
  var o=[],total=0;
  for(var t=0;t<trims.length;t++){
    var tk=trims[t].k,a=CLASSES[tk],cls=[];
    for(var i=0;i<a.length;i++){for(var j=0;j<a[i].students.length;j++){if(a[i].students[j]===name){cls.push(a[i].cls);break;}}}
    if(!cls.length)continue;total+=cls.length;
    o.push('<div class="sch-trim"><span class="sch-trim-lbl">'+trims[t].l+'</span>');
    for(var i=0;i<cls.length;i++){
      o.push('<div class="sch-row"><span class="sch-cls">'+he(sN(cls[i]))+'</span><span class="sch-fac">'+he(fN(cls[i]))+'</span></div>');}
    o.push('</div>');}
  if(!total){p.innerHTML='<div style="padding:16px 0;color:#bbb;font-size:12px">No classes found.</div>';return;}
  p.innerHTML='<div style="font-size:13px;font-weight:500;color:#111;margin-bottom:12px;margin-top:10px">'+he(name)+'<span style="font-size:11px;color:#aaa;font-weight:400;margin-left:8px">'+total+' electives</span></div>'+o.join('');}
function showTab(id,btn){
  var rc=document.getElementById('RC');
  var ps=rc.getElementsByClassName('panel');
  for(var i=0;i<ps.length;i++)ps[i].classList.remove('active');
  var tbs=document.getElementById('mainTabs').children;
  for(var i=0;i<tbs.length;i++)tbs[i].classList.remove('active');
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');at=id;
  if(id==='matrix')rMx();}
function sFlt(v){sq=v;rSu();}
function sSrt(v,btn){ss=v;
  var bs=document.getElementById('RC2').getElementsByClassName('srt');
  for(var i=0;i<bs.length;i++)bs[i].classList.remove('active');
  btn.classList.add('active');rSu();}
function fL(){q=document.getElementById('sIn').value;rL();}
function selAll(){sel={};so=[];ci=0;for(var i=0;i<STUDENTS.length;i++){sel[STUDENTS[i]]=i%PAL.length;so.push(STUDENTS[i]);}ci=STUDENTS.length;rAll();}
function clrAll(){sel={};so=[];ci=0;rAll();}
function tog(name){
  if(hs(name)){delete sel[name];
    for(var i=0;i<so.length;i++){if(so[i]===name){so.splice(i,1);break;}}
    var ns={};for(var i=0;i<so.length;i++)ns[so[i]]=i;sel=ns;ci=so.length;}
  else{sel[name]=ci%PAL.length;so.push(name);ci++;}
  rAll();}
function rAll(){rL();rB();rT('iv');rT('v');rT('vi');
  if(at==='matrix')rMx();
  renderSchList();
  if(schSel)renderSchResult();
  var sb=document.getElementById('subjBody');
  if(sb&&sb.classList.contains('open'))rSu();}
rL();rB();rT('iv');rT('v');rT('vi');
</script>
</body>
