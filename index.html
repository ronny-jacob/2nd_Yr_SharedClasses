<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Elective Class Finder – Trims IV, V & VI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f7f7f5;color:#111;min-height:100vh}
.wrap{max-width:920px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;gap:16px}
h1{font-size:19px;font-weight:600}
.sub{font-size:13px;color:#777;margin-top:3px}

.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:18px}
.card-title{font-size:13px;font-weight:600;color:#444;margin-bottom:12px}

.search-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
#searchInput{flex:1;min-width:180px;padding:7px 12px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;outline:none}
#searchInput:focus{border-color:#aaa}
.ctrl-btn{padding:6px 12px;border-radius:8px;border:0.5px solid #ccc;background:#fff;font-size:12px;cursor:pointer;color:#555;white-space:nowrap}
.ctrl-btn:hover{background:#f0f0ee}

.student-list{max-height:230px;overflow-y:auto;border:0.5px solid #eee;border-radius:8px;background:#fafafa}
.s-item{display:flex;align-items:center;gap:10px;padding:7px 12px;cursor:pointer;border-bottom:0.5px solid #f0f0ee;font-size:13px;transition:background 0.1s;user-select:none}
.s-item:last-child{border-bottom:none}
.s-item:hover{background:#f0f0ee}
.s-check{width:16px;height:16px;border-radius:4px;border:1.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;background:#fff;transition:all 0.1s}
.s-item.selected .s-check{color:#fff}
.s-name{flex:1}
.no-results{padding:16px;text-align:center;color:#aaa;font-size:13px}

.sel-bar{display:flex;align-items:flex-start;gap:8px;margin-top:12px;min-height:28px;flex-wrap:wrap}
.sel-label{font-size:12px;color:#888;white-space:nowrap;padding-top:4px;flex-shrink:0}
.sel-badges{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.sel-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px 3px 10px;border-radius:20px;font-size:12px;cursor:default;font-weight:500}
.sel-badge .rm{cursor:pointer;font-size:15px;line-height:1;opacity:0.55;margin-left:1px}
.sel-badge .rm:hover{opacity:1}
.clear-all{font-size:12px;color:#aaa;cursor:pointer;padding:3px 6px;border-radius:6px;white-space:nowrap;margin-top:2px}
.clear-all:hover{color:#555;background:#f0f0ee}

.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:8px;border:0.5px solid #ccc;font-size:13px;cursor:pointer;background:#fff;color:#555}
.tab.active{background:#111;color:#fff;border-color:#111}
.panel{display:none}.panel.active{display:block}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:#f5f5f3;padding:8px 10px;text-align:left;font-weight:500;font-size:12px;color:#666;border-bottom:0.5px solid #e0e0e0}
td{padding:9px 10px;border-bottom:0.5px solid #eee;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.cls-name{font-weight:500;font-size:13px;color:#111}
.faculty{font-size:11px;color:#bbb;margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:500;margin:2px 3px 2px 0;white-space:nowrap}
.count-pill{display:inline-block;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;white-space:nowrap;background:#f0f0ee;color:#555;border:0.5px solid #ddd}
.empty{text-align:center;padding:36px;color:#ccc;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div>
    <h1>Shared Elective Class Finder</h1>
    <p class="sub">146 students · Trimesters IV, V & VI · Select any students to see which classes they share.</p>
  </div>

  <div class="card">
    <div class="card-title">Search & select students</div>
    <div class="search-row">
      <input id="searchInput" type="text" placeholder="Type a name to search…" oninput="filterList()">
      <button class="ctrl-btn" onclick="selectVisible()">Select visible</button>
      <button class="ctrl-btn" onclick="clearAll()">Clear all</button>
    </div>
    <div class="student-list" id="studentList"></div>
    <div class="sel-bar">
      <span class="sel-label" id="selLabel">0 selected</span>
      <div class="sel-badges" id="selBadges"></div>
      <span class="clear-all" onclick="clearAll()" id="clearAllBtn" style="display:none">Clear all</span>
    </div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="showTab('iv',this)">Trimester IV</button>
      <button class="tab" onclick="showTab('v',this)">Trimester V</button>
      <button class="tab" onclick="showTab('vi',this)">Trimester VI</button>
    </div>
    <div id="panel-iv" class="panel active"></div>
    <div id="panel-v"  class="panel"></div>
    <div id="panel-vi" class="panel"></div>
  </div>
</div>

var selected = new Map();
var colorIdx = 0;
var query = '';

function shortName(cls) {
  return cls
    .replace(/\s*[-\u2013]\s*(Dr\.?|Prof\.?|New|Visiting|New\/Visiting).*$/i, '')
    .replace(/\s*\(\s*(Dr\.?|Prof\.?|New|Visiting|New\/Visiting).*$/i, '')
    .trim();
}

function facultyStr(cls) {
  var m = cls.match(/[-\u2013(]\s*(Dr\.?|Prof\.?|New[/ ]*Visiting Faculty|New Faculty|Visiting Faculty).+/i);
  return m ? m[0].replace(/^[-\u2013(\s]+/, '').replace(/\s*\(tentative\)/i, ' (tentative)').trim() : '';
}

function displayName(name) {
  var sel = Array.from(selected.keys());
  var parts = name.trim().split(/\s+/);
  var first = parts[0];
  var firstClash = sel.filter(function(n) {
    return n !== name && n.trim().split(/\s+/)[0] === first;
  });
  if (!firstClash.length) return first;
  var lastInit = parts.length > 1 ? parts[parts.length - 1][0] + '.' : '';
  var label1 = lastInit ? first + ' ' + lastInit : first;
  var label1Clash = sel.filter(function(n) {
    if (n === name) return false;
    var p = n.trim().split(/\s+/);
    var li = p.length > 1 ? p[p.length - 1][0] + '.' : '';
    return p[0] === first && (p[0] + ' ' + li) === label1;
  });
  if (!label1Clash.length) return label1;
  return name;
}

function esc(s) { return s.replace(/'/g, "\\'"); }

function renderList() {
  var list = document.getElementById('studentList');
  var q = query.toLowerCase();
  var filtered = q ? STUDENTS.filter(function(n) { return n.toLowerCase().indexOf(q) !== -1; }) : STUDENTS;
  if (!filtered.length) {
    list.innerHTML = '<div class="no-results">No students found.</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var name = filtered[i];
    var sel = selected.has(name);
    var checkStyle = sel
      ? 'background:' + PALETTE[selected.get(name)][3] + ';border-color:' + PALETTE[selected.get(name)][3]
      : 'background:#fff;border-color:#ccc';
    var rowStyle = sel ? 'background:' + PALETTE[selected.get(name)][0] : '';
    html += '<div class="s-item' + (sel ? ' selected' : '') + '" style="' + rowStyle + '" onclick="toggle(\'' + esc(name) + '\')">';
    html += '<div class="s-check" style="' + checkStyle + '">' + (sel ? '&#10003;' : '') + '</div>';
    html += '<span class="s-name">' + name + '</span>';
    html += '</div>';
  }
  list.innerHTML = html;
}

function renderBadges() {
  var badges = document.getElementById('selBadges');
  var label = document.getElementById('selLabel');
  var clearBtn = document.getElementById('clearAllBtn');
  label.textContent = selected.size + ' selected';
  clearBtn.style.display = selected.size ? 'inline' : 'none';
  var html = '';
  selected.forEach(function(ci, name) {
    var c = PALETTE[ci];
    html += '<span class="sel-badge" style="background:' + c[0] + ';color:' + c[1] + '">';
    html += name;
    html += '<span class="rm" onclick="toggle(\'' + esc(name) + '\')">&#215;</span>';
    html += '</span>';
  });
  badges.innerHTML = html;
}

function renderTables() {
  var trims = ['iv', 'v', 'vi'];
  for (var t = 0; t < trims.length; t++) {
    var tk = trims[t];
    var panel = document.getElementById('panel-' + tk);
    if (selected.size < 2) {
      panel.innerHTML = '<div class="empty">Select at least 2 students to see shared classes.</div>';
      continue;
    }
    var rows = [];
    var clsArr = CLASSES[tk];
    for (var i = 0; i < clsArr.length; i++) {
      var matched = clsArr[i].students.filter(function(s) { return selected.has(s); });
      if (matched.length >= 2) rows.push({ cls: clsArr[i].cls, matched: matched });
    }
    rows.sort(function(a, b) { return b.matched.length - a.matched.length; });
    if (!rows.length) {
      panel.innerHTML = '<div class="empty">No shared classes among selected students this trimester.</div>';
      continue;
    }
    var html = '<table>';
    html += '<tr><th style="width:33%">Class</th><th>Students together</th><th style="width:58px;text-align:center">Count</th></tr>';
    for (var r = 0; r < rows.length; r++) {
      var row = rows[r];
      var badgeHtml = '';
      for (var m = 0; m < row.matched.length; m++) {
        var n = row.matched[m];
        var c = PALETTE[selected.get(n)];
        badgeHtml += '<span class="badge" style="background:' + c[0] + ';color:' + c[1] + '">' + displayName(n) + '</span>';
      }
      html += '<tr>';
      html += '<td><div class="cls-name">' + shortName(row.cls) + '</div><div class="faculty">' + facultyStr(row.cls) + '</div></td>';
      html += '<td>' + badgeHtml + '</td>';
      html += '<td style="text-align:center"><span class="count-pill">' + row.matched.length + '</span></td>';
      html += '</tr>';
    }
    html += '</table>';
    panel.innerHTML = html;
  }
}

function toggle(name) {
  if (selected.has(name)) {
    selected.delete(name);
    var entries = Array.from(selected.entries()).sort(function(a, b) { return a[1] - b[1]; });
    selected.clear();
    for (var i = 0; i < entries.length; i++) selected.set(entries[i][0], i);
    colorIdx = selected.size;
  } else {
    selected.set(name, colorIdx % PALETTE.length);
    colorIdx++;
  }
  renderList(); renderBadges(); renderTables();
}

function filterList() {
  query = document.getElementById('searchInput').value;
  renderList();
}

function selectVisible() {
  var q = query.toLowerCase();
  var filtered = q ? STUDENTS.filter(function(n) { return n.toLowerCase().indexOf(q) !== -1; }) : STUDENTS;
  for (var i = 0; i < filtered.length; i++) {
    if (!selected.has(filtered[i])) { selected.set(filtered[i], colorIdx % PALETTE.length); colorIdx++; }
  }
  renderList(); renderBadges(); renderTables();
}

function clearAll() {
  selected.clear(); colorIdx = 0;
  renderList(); renderBadges(); renderTables();
}

function showTab(id, btn) {
  var panels = document.querySelectorAll('.panel');
  for (var i = 0; i < panels.length; i++) panels[i].classList.remove('active');
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
}

renderList(); renderBadges(); renderTables();
</script>
</body>
</html>
